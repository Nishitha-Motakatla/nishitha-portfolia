<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nishitha Motakatla | Cybersecurity Portfolio</title>
  <style>
    :root {
      --bg: #04070f;
      --bg-soft: #091120;
      --panel: rgba(9, 15, 34, 0.78);
      --panel-strong: rgba(8, 16, 40, 0.95);
      --border: rgba(0, 255, 170, 0.14);
      --text: #eef7ff;
      --muted: #9ab0c3;
      --primary: #00f0ff;
      --secondary: #00ff99;
      --accent: #785dff;
      --danger: #ff5478;
      --warning: #ffd166;
      --shadow: 0 0 35px rgba(0, 240, 255, 0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: Inter, Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 10%, rgba(0, 240, 255, 0.10), transparent 20%),
        radial-gradient(circle at 90% 18%, rgba(120, 93, 255, 0.14), transparent 22%),
        linear-gradient(180deg, #02040a 0%, #06101b 45%, #03060e 100%);
      line-height: 1.65;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,255,153,0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,153,0.045) 1px, transparent 1px);
      background-size: 36px 36px;
      pointer-events: none;
      z-index: 0;
      opacity: 0.55;
    }

    .glow {
      position: fixed;
      width: 420px;
      height: 420px;
      border-radius: 50%;
      filter: blur(95px);
      opacity: 0.13;
      z-index: 0;
      pointer-events: none;
    }

    .glow.one { background: var(--primary); top: -140px; left: -110px; }
    .glow.two { background: var(--accent); bottom: -160px; right: -80px; }

    .container {
      width: min(1150px, calc(100% - 32px));
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 22px 0;
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(12px);
    }

    .brand {
      font-size: 0.96rem;
      font-weight: 800;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--primary);
      text-shadow: 0 0 16px rgba(0,240,255,0.28);
    }

    .nav-links {
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
    }

    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      transition: 0.25s ease;
      font-size: 0.95rem;
    }

    .nav-links a:hover { color: var(--primary); }

    .hero {
      min-height: 92vh;
      display: grid;
      grid-template-columns: 1.18fr 0.92fr;
      gap: 28px;
      align-items: center;
      padding: 28px 0 44px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 24px;
      backdrop-filter: blur(12px);
      box-shadow: var(--shadow);
    }

    .hero-card {
      padding: 42px;
      position: relative;
      overflow: hidden;
    }

    .hero-card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(115deg, transparent, rgba(0,255,153,0.05), transparent);
      transform: translateX(-100%);
      animation: scan 8s linear infinite;
      pointer-events: none;
    }

    @keyframes scan { to { transform: translateX(100%); } }

    .eyebrow {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid rgba(0,240,255,0.22);
      background: rgba(0,240,255,0.05);
      color: var(--secondary);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 0.8rem;
      margin-bottom: 16px;
    }

    h1 {
      font-size: clamp(2.7rem, 5vw, 4.9rem);
      line-height: 1.02;
      margin-bottom: 14px;
    }

    .highlight {
      color: var(--primary);
      text-shadow: 0 0 18px rgba(0,240,255,0.22);
    }

    .subheading {
      color: #cfddea;
      font-size: 1.14rem;
      max-width: 720px;
      margin-bottom: 16px;
    }

    .hero-card p {
      color: var(--muted);
      font-size: 1.02rem;
      max-width: 700px;
    }

    .button-row {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 28px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 13px 20px;
      border-radius: 14px;
      font-weight: 700;
      text-decoration: none;
      transition: 0.25s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: #031019;
      box-shadow: 0 10px 28px rgba(0,240,255,0.18);
    }

    .btn-primary:hover { transform: translateY(-2px); }
